name: Build StudyApp APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip build-essential git zip unzip \
            openjdk-17-jdk libffi-dev libssl-dev zlib1g-dev \
            autoconf automake libtool pkg-config libltdl-dev \
            cmake ccache libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Python tools
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer==1.5.0 cython==0.29.33 virtualenv

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v4-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v4-${{ runner.os }}-

      - name: Setup Android SDK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH

          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"

          # Clean everything and start fresh
          rm -rf "$SDK_DIR"
          mkdir -p "$SDK_DIR"

          # Download Android command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools

          # Install into cmdline-tools/latest
          mkdir -p "$SDK_DIR/cmdline-tools/latest"
          mv /tmp/cmdtools/cmdline-tools/* "$SDK_DIR/cmdline-tools/latest/"

          # Create the OLD tools/bin path that Buildozer looks for
          # and put sdkmanager there as a symlink
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/avdmanager"  "$SDK_DIR/tools/bin/avdmanager"

          export ANDROID_SDK_ROOT="$SDK_DIR"
          export ANDROID_HOME="$SDK_DIR"
          export PATH="$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/platform-tools:$SDK_DIR/tools/bin:$PATH"

          # Accept licences
          yes | sdkmanager --sdk_root="$SDK_DIR" --licenses > /dev/null 2>&1 || true

          # Install SDK packages
          sdkmanager --sdk_root="$SDK_DIR" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

          echo "=== SDK structure ==="
          ls "$SDK_DIR"
          echo "=== tools/bin ==="
          ls "$SDK_DIR/tools/bin"

      - name: Build APK with Buildozer
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH

          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$SDK_DIR"
          export ANDROID_HOME="$SDK_DIR"
          export PATH="$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/platform-tools:$SDK_DIR/tools/bin:$PATH"

          buildozer -v android debug 2>&1 | tee build.log

          echo "--- listing bin/ ---"
          ls -lh bin/ 2>/dev/null || echo "bin/ not created"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyApp-APK
          path: bin/*.apk
          retention-days: 30

      - name: Show result
        if: always()
        run: |
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "SUCCESS! APK built:"
            ls -lh bin/*.apk
          else
            echo "FAILED — last 150 lines of build log:"
            tail -150 build.log 2>/dev/null || echo "No log"
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
