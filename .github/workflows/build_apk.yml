name: Build StudyApp APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:       # lets you trigger the build manually with one click

jobs:
  build-apk:
    runs-on: ubuntu-22.04  # GitHub's free Linux cloud machine

    steps:

      # 1 — Download your repo code onto the cloud machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2 — Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3 — Install all system packages needed by Buildozer
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libltdl-dev \
            cmake \
            ccache \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev

      # 4 — Install Python build tools
      - name: Install Python tools
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer cython virtualenv

      # 5 — Cache Android SDK/NDK so repeat builds are fast (saves ~30 min)
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # 6 — Accept all Android SDK licences (required, non-interactive)
      - name: Accept Android SDK licences
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      # 7 — Build the APK!
      - name: Build APK with Buildozer
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          # Show buildozer version for debugging
          buildozer version
          # Build with full verbose output
          buildozer -v android debug 2>&1 | tee build.log
          echo "--- Build finished, listing bin/ ---"
          ls -la bin/ 2>/dev/null || echo "bin/ folder not created"

      # 8 — Upload the APK so you can download it from GitHub
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyApp-APK
          path: bin/*.apk
          retention-days: 30

      - name: Print build log if APK missing
        if: always()
        run: |
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "APK built successfully!"
            ls -lh bin/*.apk
          else
            echo "APK NOT FOUND — printing last 100 lines of build log:"
            tail -100 build.log 2>/dev/null || echo "No build log found"
          fi       # APK stays available for 30 days

      # 9 — Upload build log if something goes wrong
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
